# Mycelia Demo — CI Pipeline
#
# Runs 3 layers of testing:
#   Layer 1: Rust tests (weaven-core, all adapters)
#   Layer 2: C# adapter tests (dotnet test)
#   Layer 3: Unity tests + build (GameCI)
#
# Required GitHub Secrets (for Unity Personal license):
#   UNITY_LICENSE  — contents of your Unity_lic.ulf file
#   UNITY_EMAIL    — Unity account email
#   UNITY_PASSWORD — Unity account password

name: Mycelia CI

permissions:
  contents: read
  checks: write

on:
  push:
    paths:
      - 'demos/mycelia/**'
      - '.github/workflows/mycelia.yml'

jobs:
  # ── Layer 1: Rust tests ──────────────────────────────────────────
  rust-tests:
    name: "Layer 1: Rust Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Run Mycelia demo tests
        run: cargo test -p weaven-core --test mycelia_demo

      - name: Run full test suite
        run: |
          cargo test -p weaven-core -p weaven-bevy -p weaven-wasm -p weaven-debugger-core \
            --features "trace,parallel"

  # ── Layer 2: C# adapter tests ───────────────────────────────────
  csharp-tests:
    name: "Layer 2: C# Adapter Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build native library
        run: cargo build -p weaven-unity --release

      - name: Run C# tests (including Mycelia)
        run: dotnet test weaven-unity/cs/Weaven.Tests/Weaven.Tests.csproj
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release

  # ── Layer 3: Unity tests + build ─────────────────────────────────
  unity-tests:
    name: "Layer 3: Unity Tests & Build"
    runs-on: ubuntu-latest
    needs: [rust-tests, csharp-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: demos/mycelia/MyceliaUnity/Library
          key: unity-library-${{ hashFiles('demos/mycelia/MyceliaUnity/Assets/**', 'demos/mycelia/MyceliaUnity/Packages/**', 'demos/mycelia/MyceliaUnity/ProjectSettings/**') }}
          restore-keys: unity-library-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build native library for Unity
        run: cargo build -p weaven-unity --release

      - name: Copy native library to Unity Plugins
        run: |
          mkdir -p demos/mycelia/MyceliaUnity/Assets/Plugins/x86_64
          cp target/release/libweaven_unity.so demos/mycelia/MyceliaUnity/Assets/Plugins/x86_64/

      - name: Run Unity EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: demos/mycelia/MyceliaUnity
          unityVersion: 6000.3.12f1
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: EditMode
          checkName: "Unity EditMode Tests"
          # Use base image (smaller than il2cpp) for faster pull
          containerRegistryRepository: unityci/editor
          customImage: unityci/editor:ubuntu-6000.3.12f1-base-3

      - name: Build StandaloneLinux64
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: demos/mycelia/MyceliaUnity
          unityVersion: 6000.3.12f1
          targetPlatform: StandaloneLinux64
          allowDirtyBuild: true
          # Use linux-mono image — has Standalone build support
          customImage: unityci/editor:ubuntu-6000.3.12f1-linux-mono-3

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mycelia-linux-build
          path: build
          retention-days: 7

      - name: Run headless test (post-build)
        if: success()
        run: |
          echo "Build succeeded. Headless gameplay tests would run here."
          echo "Use: ./build/StandaloneLinux64/MyceliaUnity -batchmode -nographics"
