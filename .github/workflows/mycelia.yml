# Mycelia Demo — CI Pipeline
#
# Runs 3 layers of testing:
#   Layer 1: Rust tests (weaven-core, all adapters)
#   Layer 2: C# adapter tests (dotnet test)
#   Layer 3: Unity tests + build (GameCI, single Docker run)
#
# Required GitHub Secrets (for Unity Personal license):
#   UNITY_LICENSE  — contents of your Unity_lic.ulf file
#   UNITY_EMAIL    — Unity account email
#   UNITY_PASSWORD — Unity account password

name: Mycelia CI

permissions:
  contents: read
  checks: write

on:
  push:
    paths:
      - 'demos/mycelia/**'
      - '.github/workflows/mycelia.yml'

jobs:
  # ── Layer 1: Rust tests ──────────────────────────────────────────
  rust-tests:
    name: "Layer 1: Rust Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Run Mycelia demo tests
        run: cargo test -p weaven-core --test mycelia_demo

      - name: Run full test suite
        run: |
          cargo test -p weaven-core -p weaven-bevy -p weaven-wasm -p weaven-debugger-core \
            --features "trace,parallel"

  # ── Layer 2: C# adapter tests ───────────────────────────────────
  csharp-tests:
    name: "Layer 2: C# Adapter Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build native library
        run: cargo build -p weaven-unity --release

      - name: Run C# tests (including Mycelia)
        run: dotnet test weaven-unity/cs/Weaven.Tests/Weaven.Tests.csproj
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release

  # ── Layer 3: Unity tests + build (single Docker run) ─────────────
  unity:
    name: "Layer 3: Unity"
    runs-on: ubuntu-latest
    needs: [rust-tests, csharp-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache
          key: docker-unity-6000.3.12f1-linux-mono-3
          restore-keys: docker-unity-

      - name: Load Docker cache
        run: |
          if [ -f /tmp/docker-cache/unity.tar ]; then
            docker load -i /tmp/docker-cache/unity.tar
            echo "Docker cache loaded"
          else
            echo "No Docker cache found, will pull fresh"
          fi

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: demos/mycelia/MyceliaUnity/Library
          key: unity-library-${{ hashFiles('demos/mycelia/MyceliaUnity/Assets/**', 'demos/mycelia/MyceliaUnity/Packages/**', 'demos/mycelia/MyceliaUnity/ProjectSettings/**') }}
          restore-keys: unity-library-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build native library for Unity
        run: cargo build -p weaven-unity --release

      - name: Copy native library to Unity Plugins
        run: |
          mkdir -p demos/mycelia/MyceliaUnity/Assets/Plugins/x86_64
          cp target/release/libweaven_unity.so demos/mycelia/MyceliaUnity/Assets/Plugins/x86_64/

      # Single Docker run: test + build in one container
      - name: Unity EditMode tests + StandaloneLinux64 build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: demos/mycelia/MyceliaUnity
          unityVersion: 6000.3.12f1
          targetPlatform: StandaloneLinux64
          allowDirtyBuild: true
          customImage: unityci/editor:ubuntu-6000.3.12f1-linux-mono-3
          # Run tests before build via custom parameters
          customParameters: -runTests -testPlatform EditMode -testResults /github/workspace/artifacts/editmode-results.xml

      - name: Save Docker cache
        if: always()
        run: |
          mkdir -p /tmp/docker-cache
          IMGID=$(docker images -q unityci/editor:ubuntu-6000.3.12f1-linux-mono-3 2>/dev/null)
          if [ -n "$IMGID" ] && [ ! -f /tmp/docker-cache/unity.tar ]; then
            docker save unityci/editor:ubuntu-6000.3.12f1-linux-mono-3 -o /tmp/docker-cache/unity.tar
            echo "Docker image saved to cache"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mycelia-linux-build
          path: build
          retention-days: 7
