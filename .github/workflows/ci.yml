name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: |
          cargo test -p weaven-core -p weaven-bevy -p weaven-wasm -p weaven-debugger-core \
            --features "trace,parallel"

  wasm-check:
    name: WASM Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build WASM target
        run: cargo build -p weaven-wasm --target wasm32-unknown-unknown

  debugger-ui-test:
    name: Debugger UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: weaven-debugger/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: weaven-debugger
      - name: Run tests
        run: npm test
        working-directory: weaven-debugger

  browser-test:
    name: Browser Adapter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: weaven-browser/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: weaven-browser
      - name: Run tests
        run: npm test
        working-directory: weaven-browser
